<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRIUM</title>
    <!-- Прописали хвостик ?v=5 для жесткого сброса кэша браузера -->
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

    <canvas id="atom-canvas"></canvas>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo.png" alt="NATRIUM" class="logo" id="site-logo">
        </div>

        <h1 id="site-title">Natrium</h1>
        <div class="subtitle" id="site-subtitle">Сборка-каркас на Minecraft, состоящая из полной оптимизации</div>

        <!-- 3 КАРТОЧКИ В РЯД -->
        <div class="cards-grid">
            
            <!-- Левая карточка: Канал -->
            <a href="https://t.me" target="_blank" class="card info-card">
                <span class="card-title">Telegram</span>
                <span class="card-desc">Наш официальный канал с новостями проекта</span>
                <div class="btn-card-action">Перейти: <span>@JavaFixer</span></div>
            </a>

            <!-- Центральная карточка: Скачивание -->
            <div class="card main-card">
                <span class="version-tag">1.20.1</span>
                <span class="file-type">Модпак .mrpack</span>
                <a href="natrium.mrpack" download="Natrium_1.20.1.mrpack" class="btn-download">Скачать сборку</a>
            </div>

            <!-- Правая карточка: Чат -->
            <a href="https://t.meChat" target="_blank" class="card info-card">
                <span class="card-title">Community</span>
                <span class="card-desc">Наш уютный чат для общения игроков</span>
                <div class="btn-card-action">Войти: <span>@JavaFixerChat</span></div>
            </a>

        </div>

        <!-- Нижняя кнопка техподдержки -->
        <a href="https://t.meTEXbot" target="_blank" class="bot-support">
            Нашли баг или краш? Пишите в бота: <span>@JavaFixerTEXbot</span>
        </a>
    </div>

    <!-- ВЕСЬ ДВИЖОК ЭФФЕКТОВ БЕЗ ЛИШНИХ НАСТРОЕК -->
    <script>
        const fav = document.createElement('link');
        fav.rel = 'icon'; fav.href = 'favicon.png?v=5';
        document.head.appendChild(fav);

        const canvas = document.getElementById('atom-canvas');
        const ctx = canvas.getContext('2d');
        let particles = []; let sparks = []; 
        const mouse = { x: null, y: null, radius: 140 };

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => { 
            mouse.x = e.x; mouse.y = e.y;
            if (sparks.length < 40) sparks.push(new Spark(e.x, e.y));
        });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseX = x; this.baseY = y;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.4; this.speedY = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.baseX += this.speedX; this.baseY += this.speedY;
                if (this.baseX < 0 || this.baseX > canvas.width) this.speedX *= -1;
                if (this.baseY < 0 || this.baseY > canvas.height) this.speedY *= -1;
                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.baseX; let dy = mouse.y - this.baseY;
                    let distance = Math.hypot(dx, dy);
                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        let angle = Math.atan2(dy, dx);
                        let targetX = this.baseX - Math.cos(angle) * force * 35;
                        let targetY = this.baseY - Math.sin(angle) * force * 35;
                        this.x += (targetX - this.x) * 0.1; this.y += (targetY - this.y) * 0.1;
                        return;
                    }
                }
                this.x += (this.baseX - this.x) * 0.08; this.y += (this.baseY - this.y) * 0.08;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255, 180, 0, 0.25)' : 'rgba(255, 85, 0, 0.15)';
                ctx.fill();
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y; this.size = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 1.5; this.speedY = (Math.random() - 0.5) * 1.5;
                this.alpha = 1; 
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.02; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.shadowBlur = 10; ctx.shadowColor = '#ffaa00'; ctx.fillStyle = '#ffcc00';
                ctx.fill(); ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < count; i++) particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) { p.update(); p.draw(); }
            for (let i = 0; i < sparks.length; i++) {
                sparks[i].update(); sparks[i].draw();
                if (sparks[i].alpha <= 0) { sparks.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        resizeCanvas(); animate();
    </script>
</body>
</html>
